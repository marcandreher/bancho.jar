name: Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make wrapper executable
        run: chmod +x gradlew

      - name: Build shaded JAR
        run: ./gradlew shadowJar

      - name: Create standalone ZIP
        run: |
          mkdir standalone

          cp build/libs/server-shaded.jar standalone/app.jar

          if [ -f .env.example ]; then
            cp .env.example standalone/.env
          fi

          cp README.md standalone/
          cp sql/base.sql standalone/
          cp nginx/bancho.conf standalone/nginx.conf

          cd standalone
          zip -r ../standalone.zip .

      - name: Upload standalone.zip
        uses: softprops/action-gh-release@v2
        with:
          files: standalone.zip