name: Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Build shaded JAR
        run: mvn -B clean package

      - name: Create standalone ZIP
        run: |
          mkdir standalone

          # Copy shaded JAR
          cp target/server.jar standalone/app.jar

          # Copy additional files
          cp .env.example standalone/.env
          cp README.md standalone/

          cd standalone
          zip -r ../standalone.zip .

      - name: Upload standalone.zip
        uses: softprops/action-gh-release@v2
        with:
          files: standalone.zip