services:
  mysql:
    image: mysql:9.6.0
    container_name: ${CONTAINER_PREFIX}-mysql
    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: 'yes'
      MYSQL_ROOT_HOST: 'none'
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_TCP_PORT: ${DB_PORT}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - ./.data/mysql:/var/lib/mysql
      - ./sql/base.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USER}", "-p${DB_PASS}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    tty: true
    stdin_open: true
    container_name: ${CONTAINER_PREFIX}-server
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "127.0.0.1:${SERVER_PORT}:${SERVER_PORT}"
    volumes:
      - ./.data/server/data:/app/data
      - ./.data/server/logs:/app/logs
      - ./.data/server/.config:/app/.config
    environment:
      DB_HOST: mysql
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      DB_TIMEZONE: ${DB_TIMEZONE}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LEVEL: ${SERVER_LEVEL}
      DOMAIN: ${SERVER_DOMAIN}
      PORT: ${SERVER_PORT}
      OSU_API_KEY: ${SERVER_OSU_API_KEY}
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost ${SERVER_PORT} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    
  pma:
    image: phpmyadmin:5.2.3
    container_name: ${CONTAINER_PREFIX}-pma
    environment:
      PMA_HOST: mysql
      PMA_PORT: ${DB_PORT}
      MEMORY_LIMIT: 512M
      UPLOAD_LIMIT: 500M
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - 127.0.0.1:${PMA_PORT}:80
    restart: unless-stopped

  redis:
    image: redis:7.2.1
    container_name: ${CONTAINER_PREFIX}-redis
    command: ["redis-server"]
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./.data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s